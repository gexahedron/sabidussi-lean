status:
  scope: >-
    Lean 4 and Mathlib formalization of Theorem 1.1 (Sabidussi compatibility)
    and the proof-driving results in Sections 2–7 of the source manuscript.
    The model permits labelled parallel edges and loops, counts both ends of
    a loop in vertex degree, and concludes with ordinary nonempty connected
    2-regular circuits. The expository circuit-double-cover discussion in
    Section 8 and the dimer/spin interpretation in Section 9 are outside the
    formalization's scope. The sorry counts exclude the statement-only
    Comparator challenge fixture.
  sorry_count: 0
  sorry_in_definitions: 0
  axioms:
    - "propext"
    - "Classical.choice"
    - "Quot.sound"
  main_results:
    - declaration: "Sabidussi.LoopMultigraph.loop_sabidussi_compatibility_ordinary"
      file: "Sabidussi/OrdinaryCircuit.lean"
      sorry_count: 0
      axioms:
        - "propext"
        - "Classical.choice"
        - "Quot.sound"
      comparator_config: "comparator/sabidussi_compatibility.json"
      literature_dependencies: []

